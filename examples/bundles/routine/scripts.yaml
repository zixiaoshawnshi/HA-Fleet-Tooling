# Morning and evening routine scripts
morning_setup:
  alias: Morning Setup
  description: Setup automations and helpers for morning routine
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.bedroom
      data:
        brightness_pct: 50
        transition: 300
    - service: media_player.volume_set
      target:
        entity_id: media_player.bedroom_speaker
      data:
        volume_level: 0.3
    - delay:
        seconds: 5
    - service: script.play_morning_playlist
      data: {}

evening_setup:
  alias: Evening Setup
  description: Setup automations and helpers for evening routine
  sequence:
    - service: light.turn_on
      target:
        entity_id: light.living_room
      data:
        brightness_pct: 30
        color_temp: 2700
    - service: climate.set_temperature
      target:
        entity_id: climate.thermostat
      data:
        temperature: 20
    - service: lock.lock
      target:
        entity_id: lock.front_door
    - service: light.turn_off
      target:
        entity_id:
          - light.hallway
          - light.kitchen

play_morning_playlist:
  alias: Play Morning Playlist
  description: Play morning music on bedroom speaker
  sequence:
    - service: media_player.play_media
      target:
        entity_id: media_player.bedroom_speaker
      data:
        media_content_type: playlist
        media_content_id: "spotify:playlist:morning_vibes"
